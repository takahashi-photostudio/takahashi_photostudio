<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作例 | 高橋写真店</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 48px;
    }

    .filter-btn {
      padding: 9px 24px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--white);
      color: var(--gray);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 1100px;
      margin: 0 auto 60px;
    }

    .g-item {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
    }

    .g-item .thumb {
      aspect-ratio: 4/3;
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .g-item:hover .thumb { transform: scale(1.06); }

    .g-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(42,122,82,0);
      transition: background 0.3s;
    }

    .g-item:hover .overlay {
      background: rgba(42,122,82,0.3);
    }

    .g-item .tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(42,122,82,0.9);
      color: #fff;
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 0.1em;
    }

    .gallery-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 0;
      color: var(--gray);
      font-size: 0.9rem;
      line-height: 2;
    }

    .gallery-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 0;
      color: var(--gray);
      font-size: 0.9rem;
    }

    @media (max-width: 680px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body class="page-body">

  <header>
    <a href="index.html" class="logo">
      <span class="logo-main">高橋写真店</span>
      <span class="logo-sub">TAKAHASHI PHOTO STUDIO</span>
    </a>
    <nav class="header-nav">
      <a href="works.html" class="active">作例</a>
      <a href="menu.html">メニュー</a>
      <a href="profile.html">プロフィール</a>
      <a href="voice.html">お客様の声</a>
      <a href="contact.html" class="nav-contact">お問い合わせ</a>
    </nav>
  </header>

  <div class="page-hero">
    <h1>作例</h1>
    <span class="page-hero-en">WORKS</span>
  </div>

  <section class="section">
    <div class="section-label">
      <h2>撮影作品集</h2>
      <span class="en">PHOTO GALLERY</span>
      <div class="divider"></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterGallery(this,'all')">すべて</button>
      <button class="filter-btn" onclick="filterGallery(this,'753')">七五三</button>
      <button class="filter-btn" onclick="filterGallery(this,'miya')">お宮参り</button>
      <button class="filter-btn" onclick="filterGallery(this,'wedding')">ウエディング</button>
      <button class="filter-btn" onclick="filterGallery(this,'maternity')">マタニティ</button>
      <button class="filter-btn" onclick="filterGallery(this,'newborn')">ニューボーン</button>
    </div>

    <div class="gallery-grid" id="galleryGrid">
      <div class="gallery-loading">読み込み中...</div>
    </div>

    <div style="text-align:center; margin-top: 16px;">
      <a href="contact.html" class="btn btn-green">撮影を相談する</a>
    </div>
  </section>

  <footer>
    <div class="footer-logo">高橋写真店</div>
    <nav class="footer-nav">
      <a href="index.html">トップ</a>
      <a href="works.html">作例</a>
      <a href="menu.html">メニュー</a>
      <a href="profile.html">プロフィール</a>
      <a href="voice.html">お客様の声</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
    <p class="footer-copy">Copyright © 2026 高橋写真店 All Rights Reserved.</p>
  </footer>

  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button>

  <script>
    // カテゴリ設定（prefix: ファイル名プレフィックス、label: 表示名、max: 最大枚数）
    const CATEGORIES = [
      { prefix: '753',      label: '七五三',       max: 20 },
      { prefix: 'miya',     label: 'お宮参り',     max: 20 },
      { prefix: 'wedding',  label: 'ウエディング', max: 20 },
      { prefix: 'maternity',label: 'マタニティ',   max: 20 },
      { prefix: 'newborn',  label: 'ニューボーン', max: 20 },
    ];

    // 画像が存在するか確認
    function checkImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload  = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    // ギャラリーアイテムを作成
    function createItem(src, cat) {
      const div = document.createElement('div');
      div.className = 'g-item';
      div.dataset.cat = cat.prefix;
      div.innerHTML = `
        <img class="thumb" src="${src}" alt="${cat.label}の作例" loading="lazy">
        <div class="overlay"></div>
        <span class="tag">${cat.label}</span>
      `;
      return div;
    }

    // ギャラリーを読み込み
    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '<div class="gallery-loading">読み込み中...</div>';

      const items = [];
      let total = 0;

      for (const cat of CATEGORIES) {
        for (let i = 1; i <= cat.max; i++) {
          if (total >= 100) break;
          const filename = `${cat.prefix}_${i}.jpg`;
          const exists = await checkImage(filename);
          if (exists) {
            items.push(createItem(filename, cat));
            total++;
          } else {
            break; // 連番が途切れたらそのカテゴリは終了
          }
        }
      }

      grid.innerHTML = '';
      if (items.length === 0) {
        grid.innerHTML = '<div class="gallery-empty">作例写真を準備中です。<br>撮影のご依頼はお問い合わせからどうぞ。</div>';
      } else {
        items.forEach(item => grid.appendChild(item));
      }
    }

    // フィルタリング
    function filterGallery(btn, cat) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.g-item').forEach(item => {
        item.style.display = (cat === 'all' || item.dataset.cat === cat) ? '' : 'none';
      });
    }

    window.addEventListener('scroll', () => {
      document.getElementById('scrollTop').classList.toggle('visible', scrollY > 300);
    });

    // 読み込み開始
    loadGallery();
  </script>
</body>
</html>
